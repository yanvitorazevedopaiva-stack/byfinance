<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PERSONA Finance OS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#0058ca",
                    "on-tertiary": "#5a1c00",
                    "on-error": "#690005",
                    "primary": "#b0c6ff",
                    "on-tertiary-fixed": "#370e00",
                    "on-secondary-fixed-variant": "#274581",
                    "secondary-container": "#274581",
                    "on-secondary-fixed": "#001944",
                    "surface-tint": "#b0c6ff",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#00429b",
                    "on-primary-container": "#002761",
                    "error-container": "#93000a",
                    "tertiary": "#ffb599",
                    "outline": "#71788a",
                    "on-surface-variant": "#414655",
                    "on-primary": "#ffffff",
                    "primary-container": "#558dff",
                    "on-surface": "#1c2028",
                    "inverse-surface": "#1c2028",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#f26420",
                    "secondary-fixed-dim": "#afc6ff",
                    "tertiary-fixed": "#ffdbce",
                    "surface": "#f0f2f5",
                    "surface-container-low": "#f8f9fb",
                    "inverse-on-surface": "#ffffff",
                    "on-primary-fixed": "#001944",
                    "surface-container": "#ffffff",
                    "on-tertiary-container": "#4f1800",
                    "primary-fixed-dim": "#b0c6ff",
                    "outline-variant": "#d9e2ff",
                    "surface-bright": "#ffffff",
                    "on-tertiary-fixed-variant": "#7f2b00",
                    "surface-dim": "#d9e2ff",
                    "tertiary-fixed-dim": "#ffb599",
                    "background": "#f0f2f5",
                    "on-background": "#1c2028",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e1e2ec",
                    "secondary-fixed": "#d9e2ff",
                    "surface-variant": "#e1e2ec",
                    "surface-container-high": "#ebecee",
                    "secondary": "#3f5f9a",
                    "error": "#ba1a1a",
                    "on-secondary-container": "#001944",
                    "primary-fixed": "#d9e2ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-margin": "32px",
                    "grid-gutter": "20px",
                    "md": "16px",
                    "xs": "4px",
                    "lg": "24px",
                    "xl": "40px",
                    "sm": "8px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "body-main": ["Inter"],
                    "data-mono": ["JetBrains Mono"],
                    "headline-md": ["Inter"],
                    "label-caps": ["Space Grotesk"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-main": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "data-mono": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 88, 202, 0.1);
        }
        .neon-glow {
            box-shadow: 0 10px 30px -5px rgba(0, 88, 202, 0.1);
        }
        .diffuse-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.2;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background min-h-screen font-body-main text-on-surface flex items-center justify-center p-md overflow-hidden">
<!-- Background Decoration -->
<div class="diffuse-blob bg-primary/30 top-[-100px] left-[-100px]"></div>
<div class="diffuse-blob bg-secondary-container/10 bottom-[-100px] right-[-100px]"></div>
<div class="diffuse-blob bg-primary-container/20 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
<main class="relative z-10 w-full max-w-[400px]">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-inverse-primary tracking-[0.2em] mb-xs uppercase">PERSONA</h1>
<p class="font-label-caps text-on-surface-variant uppercase tracking-widest">Technological Financial Operating System</p>
</div>
<!-- Central Login Card -->
<div class="glass-card rounded-xl p-lg neon-glow">
<!-- Tabs -->
<div class="flex border-b border-outline-variant mb-lg">
<button class="flex-1 pb-md text-inverse-primary border-b-2 border-inverse-primary font-headline-md text-sm transition-all">
                    Login
                </button>
<button class="flex-1 pb-md text-on-surface-variant font-headline-md text-sm hover:text-on-surface transition-all">
                    Register
                </button>
<button class="flex-1 pb-md text-on-surface-variant font-headline-md text-sm hover:text-on-surface transition-all">
                    Recover
                </button>
</div>
<!-- Form -->
<form class="space-y-lg">
<div class="space-y-xs">
<label class="font-label-caps text-on-surface-variant uppercase block">Access Identity</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-inverse-primary transition-colors" data-icon="fingerprint">fingerprint</span>
<input class="w-full bg-surface-container-high border border-outline-variant rounded-lg py-md pl-[48px] pr-md text-on-surface placeholder:text-outline/60 focus:outline-none focus:border-inverse-primary focus:ring-1 focus:ring-inverse-primary/20 transition-all font-data-mono" placeholder="Username or UUID" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-on-surface-variant uppercase block">Encryption Key</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-inverse-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border border-outline-variant rounded-lg py-md pl-[48px] pr-md text-on-surface placeholder:text-outline/60 focus:outline-none focus:border-inverse-primary focus:ring-1 focus:ring-inverse-primary/20 transition-all font-data-mono" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-xs">
<label class="flex items-center space-x-sm cursor-pointer group">
<div class="relative w-5 h-5 bg-surface-container-highest border border-outline-variant rounded group-hover:border-inverse-primary transition-colors">
<input class="sr-only peer" type="checkbox"/>
<span class="material-symbols-outlined absolute inset-0 text-[16px] text-inverse-primary opacity-0 peer-checked:opacity-100 transition-opacity flex items-center justify-center" data-icon="check">check</span>
</div>
<span class="font-label-caps text-on-surface-variant group-hover:text-on-surface">Secure Persistence</span>
</label>
<a class="font-label-caps text-inverse-primary hover:underline underline-offset-4" href="#">Secondary Auth?</a>
</div>
<button class="w-full bg-inverse-primary text-white font-headline-md py-md rounded-lg flex items-center justify-center space-x-sm hover:shadow-[0_4px_12px_rgba(0,88,202,0.3)] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="login">login</span>
<span>INITIALIZE SYSTEM</span>
</button>
</form>
<!-- Biometric / Social Grid -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-label-caps text-on-surface-variant mb-md">Universal Verification Gateways</p>
<div class="grid grid-cols-3 gap-md">
<button class="bg-surface-container-high border border-outline-variant p-md rounded-lg hover:border-inverse-primary transition-all flex items-center justify-center group">
<span class="material-symbols-outlined text-on-surface group-hover:text-inverse-primary" data-icon="face">face</span>
</button>
<button class="bg-surface-container-high border border-outline-variant p-md rounded-lg hover:border-inverse-primary transition-all flex items-center justify-center group">
<span class="material-symbols-outlined text-on-surface group-hover:text-inverse-primary" data-icon="key">key</span>
</button>
<button class="bg-surface-container-high border border-outline-variant p-md rounded-lg hover:border-inverse-primary transition-all flex items-center justify-center group">
<span class="material-symbols-outlined text-on-surface group-hover:text-inverse-primary" data-icon="contactless">contactless</span>
</button>
</div>
</div>
</div>
<!-- Status Bar Mimic -->
<div class="mt-lg flex justify-between px-md opacity-60">
<div class="flex items-center space-x-sm">
<div class="w-2 h-2 rounded-full bg-inverse-primary animate-pulse"></div>
<span class="font-data-mono text-[10px] uppercase text-on-surface">Node Status: Operational</span>
</div>
<div class="flex items-center space-x-sm text-on-surface">
<span class="font-data-mono text-[10px] uppercase">v2.4.0-Stable</span>
<span class="material-symbols-outlined text-xs" data-icon="wifi">wifi</span>
</div>
</div>
</main>
<!-- Footer Aesthetic -->
<footer class="fixed bottom-lg left-1/2 -translate-x-1/2 w-full text-center pointer-events-none opacity-40 px-md">
<p class="font-label-caps text-[10px] tracking-[0.4em] uppercase text-on-surface">Secured by Persona Cryptographic Engine</p>
</footer>
<!-- Decorative Corner Element -->
<div class="fixed top-0 right-0 p-lg opacity-10 hidden md:block">
<div class="border-t-2 border-r-2 border-inverse-primary w-16 h-16 rounded-tr-xl"></div>
</div>
<div class="fixed bottom-0 left-0 p-lg opacity-10 hidden md:block">
<div class="border-b-2 border-l-2 border-inverse-primary w-16 h-16 rounded-bl-xl"></div>
</div>
</body></html>
