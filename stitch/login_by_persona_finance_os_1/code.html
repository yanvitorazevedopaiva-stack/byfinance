<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 255, 157, 0.15);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.15), inset 0 0 10px rgba(0, 255, 157, 0.05);
        }
        .diffuse-blob {
            position: absolute;
            width: 300px;
            height: 300px;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface-container-lowest min-h-screen font-body-main text-on-surface flex items-center justify-center p-md overflow-hidden">
<!-- Background Decoration -->
<div class="diffuse-blob bg-primary-container top-[-100px] left-[-100px]"></div>
<div class="diffuse-blob bg-secondary-container bottom-[-100px] right-[-100px]"></div>
<div class="diffuse-blob bg-surface-tint top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
<main class="relative z-10 w-full max-w-[400px]">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-primary-container tracking-[0.2em] mb-xs drop-shadow-[0_0_12px_rgba(0,255,157,0.4)] uppercase">PERSONA</h1>
<p class="font-label-caps text-on-surface-variant uppercase tracking-widest">Technological Financial Operating System</p>
</div>
<!-- Central Login Card -->
<div class="glass-card rounded-xl p-lg neon-glow">
<!-- Tabs -->
<div class="flex border-b border-outline-variant/30 mb-lg">
<button class="flex-1 pb-md text-primary-container border-b-2 border-primary-container font-headline-md text-sm transition-all">
                    Login
                </button>
<button class="flex-1 pb-md text-on-surface-variant font-headline-md text-sm hover:text-on-surface transition-all">
                    Register
                </button>
<button class="flex-1 pb-md text-on-surface-variant font-headline-md text-sm hover:text-on-surface transition-all">
                    Recover
                </button>
</div>
<!-- Form -->
<form class="space-y-lg">
<div class="space-y-xs">
<label class="font-label-caps text-on-surface-variant uppercase block">Access Identity</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors" data-icon="fingerprint">fingerprint</span>
<input class="w-full bg-surface-container-high border border-outline-variant rounded-lg py-md pl-[48px] pr-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/20 transition-all font-data-mono" placeholder="Username or UUID" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-on-surface-variant uppercase block">Encryption Key</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border border-outline-variant rounded-lg py-md pl-[48px] pr-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/20 transition-all font-data-mono" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-xs">
<label class="flex items-center space-x-sm cursor-pointer group">
<div class="relative w-5 h-5 bg-surface-container-highest border border-outline-variant rounded group-hover:border-primary-container transition-colors">
<input class="sr-only peer" type="checkbox"/>
<span class="material-symbols-outlined absolute inset-0 text-[16px] text-primary-container opacity-0 peer-checked:opacity-100 transition-opacity flex items-center justify-center" data-icon="check">check</span>
</div>
<span class="font-label-caps text-on-surface-variant group-hover:text-on-surface">Secure Persistence</span>
</label>
<a class="font-label-caps text-primary-container hover:underline underline-offset-4" href="#">Secondary Auth?</a>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline-md py-md rounded-lg flex items-center justify-center space-x-sm hover:shadow-[0_0_20px_rgba(0,255,157,0.4)] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="login">login</span>
<span>INITIALIZE SYSTEM</span>
</button>
</form>
<!-- Biometric / Social Grid -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 text-center">
<p class="font-label-caps text-on-surface-variant mb-md">Universal Verification Gateways</p>
<div class="grid grid-cols-3 gap-md">
<button class="bg-surface-container-high border border-outline-variant p-md rounded-lg hover:border-primary-container transition-all flex items-center justify-center group">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary-container" data-icon="face">face</span>
</button>
<button class="bg-surface-container-high border border-outline-variant p-md rounded-lg hover:border-primary-container transition-all flex items-center justify-center group">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary-container" data-icon="key">key</span>
</button>
<button class="bg-surface-container-high border border-outline-variant p-md rounded-lg hover:border-primary-container transition-all flex items-center justify-center group">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary-container" data-icon="contactless">contactless</span>
</button>
</div>
</div>
</div>
<!-- Status Bar Mimic -->
<div class="mt-lg flex justify-between px-md opacity-40">
<div class="flex items-center space-x-sm">
<div class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></div>
<span class="font-data-mono text-[10px] uppercase">Node Status: Operational</span>
</div>
<div class="flex items-center space-x-sm">
<span class="font-data-mono text-[10px] uppercase">v2.4.0-Stable</span>
<span class="material-symbols-outlined text-xs" data-icon="wifi">wifi</span>
</div>
</div>
</main>
<!-- Footer Aesthetic (Hidden in Mobile context, but following system logic) -->
<footer class="fixed bottom-lg left-1/2 -translate-x-1/2 w-full text-center pointer-events-none opacity-30 px-md">
<p class="font-label-caps text-[10px] tracking-[0.4em] uppercase">Secured by BY Persona Cryptographic Engine</p>
</footer>
<!-- Decorative Corner Element -->
<div class="fixed top-0 right-0 p-lg opacity-20 hidden md:block">
<div class="border-t-2 border-r-2 border-primary-container w-16 h-16 rounded-tr-xl"></div>
</div>
<div class="fixed bottom-0 left-0 p-lg opacity-20 hidden md:block">
<div class="border-b-2 border-l-2 border-primary-container w-16 h-16 rounded-bl-xl"></div>
</div>
